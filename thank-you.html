<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>धन्यवाद! | JVS कर्णबधिर विद्यालय</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700;800&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-alt);
            text-align: center;
            padding: 24px;
        }
        .thank-you-card {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 60px 48px;
            max-width: 560px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-light);
        }
        .thank-you-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 28px;
            background: var(--secondary-light);
            color: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .thank-you-card h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text);
        }
        .thank-you-card .subtitle-en {
            font-family: var(--font-en);
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 20px;
        }
        .thank-you-card p {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 8px;
        }
        .thank-you-card .msg-en {
            font-family: var(--font-en);
            font-size: 0.9rem;
            color: var(--text-light);
            font-style: italic;
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="thank-you-page">
        <div class="thank-you-card">
            <div class="thank-you-icon"><i class="fas fa-check"></i></div>
            <h1>धन्यवाद!</h1>
            <p class="subtitle-en">Thank You!</p>
            <p>आपला संदेश यशस्वीरित्या पाठवला गेला आहे. आम्ही लवकरच आपल्याशी संपर्क साधू.</p>
            <p class="msg-en">Your message has been sent successfully. We will get back to you soon.</p>
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-home"></i> मुख्यपृष्ठावर परत जा <span class="btn-en">/ Back to Home</span>
            </a>
        </div>
    </div>
</body>
</html>
